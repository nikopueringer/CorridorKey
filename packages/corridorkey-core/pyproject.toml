[project]
name = "corridorkey-core"
version = "0.1.0"
description = "Core inference engine and compositing utilities for the CorridorKey AI chroma keying model."
requires-python = ">=3.13"
readme = "README.md"
authors = [{ name = "Corridor Digital" }]
maintainers = [{ name = "Rajesh Das", email = "rajesh@hyperoot.dev" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Topic :: Multimedia :: Video",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering :: Image Processing",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Operating System :: OS Independent",
    "Typing :: Typed",
]

dependencies = [
    "torch==2.10.0",
    "torchvision==0.25.0",
    "opencv-python>=4.13.0.92",
    "timm>=1.0.25",
]

[dependency-groups]
dev = ["pytest>=9.0.2", "pytest-cov>=7.0.0", "hypothesis>=6.151.9"]

[project.optional-dependencies]
cuda = ["torch==2.10.0", "torchvision==0.25.0"]
mlx = ["corridorkey-mlx"]

[tool.uv]
conflicts = [[{ extra = "cuda" }, { extra = "mlx" }]]

[[tool.uv.index]]
name = "pytorch"
url = "https://download.pytorch.org/whl/cu128"
explicit = true
extra = "cuda"

[tool.uv.sources]
timm = { git = "https://github.com/Raiden129/pytorch-image-models-fix", branch = "fix/hiera-flash-attention-global-4d" }
torch = [{ index = "pytorch", extra = "cuda" }]
torchvision = [{ index = "pytorch", extra = "cuda" }]
corridorkey-mlx = { git = "https://github.com/nikopueringer/corridorkey-mlx.git", extra = "mlx" }

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "gpu: requires CUDA GPU (skipped in CI)",
    "slow: long-running test",
    "mlx: requires Apple Silicon with MLX installed",
]
addopts = "--tb=short --cov-config=packages/corridorkey-core/pyproject.toml"

[tool.coverage.run]
omit = ["*/inference_engine.py", "*\\inference_engine.py"]

[tool.coverage.report]
fail_under = 75
