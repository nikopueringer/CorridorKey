[tools]
python = "3.14"
uv = "latest"
git-cliff = "latest"
markdownlint-cli2 = "latest"

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["python"]

[hooks]
enter = "bash ./scripts/enter-project-hook.sh"

[env]
_.file = '.env'       # for sensitive data
UV_LINK_MODE = "copy"

[tasks.docs]
run = "uv run zensical serve"
description = "Serve the documentation locally"

[tasks.check]
run = "uv run ty check packages"
description = "Run type checking"

[tasks.sync-cuda]
run = "uv sync --extra cuda --all-groups"
description = "Run uv sync for devs"

[tasks.test]
run = "uv run pytest packages/corridorkey-core/tests"
description = "Run fast tests (slow, GPU, and MLX skipped by default)"

[tasks.test-slow]
run = "uv run pytest packages/corridorkey-core/tests --run-slow"
description = "Run all CPU tests including slow model forward pass tests"

[tasks.test-gpu]
run = "uv run pytest packages/corridorkey-core/tests --run-gpu"
description = "Run GPU tests (requires CUDA)"

[tasks.test-cov]
run = "uv run pytest packages/corridorkey-core/tests --cov=corridorkey_core --cov-report=term-missing --cov-fail-under=75 --cov-config=packages/corridorkey-core/pyproject.toml"
description = "Run fast tests with coverage report (fails under 75%)"
